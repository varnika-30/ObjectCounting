<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Counting System</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.20), transparent 30%),
        linear-gradient(135deg, #eaf2ff 0%, #eef2ff 45%, #f7f1ff 100%);
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 32px;
      box-shadow:
        0 20px 45px rgba(79, 70, 229, 0.12),
        0 8px 18px rgba(15, 23, 42, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.55);
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      color: #1e293b;
      font-size: 30px;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #334155;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.14);
    }

    .file-upload-box {
      border: 2px dashed #a5b4fc;
      border-radius: 16px;
      background: rgba(248, 250, 252, 0.95);
      padding: 16px;
      transition: 0.25s ease;
    }

    .file-upload-box:hover {
      border-color: #7c3aed;
      background: #f8faff;
    }

    .file-upload-box input[type="file"] {
      display: none;
    }

    .custom-file-label {
      display: inline-block;
      padding: 11px 18px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #ffffff !important;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(99, 102, 241, 0.22);
      transition: 0.25s ease;
    }

    .custom-file-label:hover {
      transform: translateY(-1px);
      opacity: 0.97;
    }

    .file-name {
      margin-top: 12px;
      font-size: 14px;
      color: #475569;
      word-break: break-word;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .upload-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 8px 18px rgba(99, 102, 241, 0.25);
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .stop-btn {
      background: rgba(241, 245, 249, 0.92);
      color: #334155;
      border: 1px solid #cbd5e1;
    }

    .stop-btn:hover {
      background: #e2e8f0;
      transform: translateY(-2px);
    }

    .status-box,
    .result-box,
    .links-box,
    .history-box,
    .live-box {
      margin-top: 18px;
      padding: 15px;
      border-radius: 16px;
      font-size: 15px;
      background: rgba(248, 250, 252, 0.96);
      border: 1px solid #e2e8f0;
    }

    .status-box {
      color: #4338ca;
      font-weight: 600;
    }

    .links-box a {
      display: block;
      margin-top: 8px;
      color: #4338ca;
      text-decoration: none;
      font-weight: bold;
    }

    .links-box a:hover {
      text-decoration: underline;
    }

    .session-item {
      padding: 10px 0;
      border-bottom: 1px solid #e2e8f0;
      font-size: 14px;
      color: #334155;
    }

    .session-item:last-child {
      border-bottom: none;
    }

    #liveFeed {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      border-radius: 14px;
      background: transparent;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>📦 Box Counting System</h1>
    <p class="subtitle">Upload a video or use laptop webcam for live box counting</p>

    <div class="input-group">
      <label>Mode</label>
      <select id="mode" onchange="toggleMode()">
        <option value="upload">Upload Video</option>
        <option value="webcam">Laptop Webcam Live Feed</option>
      </select>
    </div>

    <div class="input-group">
      <label>Operator ID</label>
      <input type="text" id="operatorId" value="operator_1">
    </div>

    <div class="input-group">
      <label>Batch ID</label>
      <input type="text" id="batchId" value="batch_1">
    </div>

    <div class="input-group">
      <label>Confidence Threshold</label>
      <input type="number" id="confidence" value="0.5" step="0.1" min="0" max="1">
    </div>

    <div class="input-group" id="uploadSection">
      <label>Upload Video</label>
      <div class="file-upload-box">
        <label for="videoFile" class="custom-file-label">Choose Video</label>
        <input type="file" id="videoFile" accept="video/*" onchange="updateFileName()">
        <div class="file-name" id="fileName">No file chosen</div>
      </div>
    </div>

    <div class="button-group">
      <button class="upload-btn" id="startBtn" onclick="startSession()">Start Session</button>
      <button class="stop-btn webcam-only" id="pauseBtn" onclick="pauseSession()" style="display:none;">Pause</button>
      <button class="stop-btn webcam-only" id="resumeBtn" onclick="resumeSession()" style="display:none;">Resume</button>
      <button class="stop-btn webcam-only" id="doneBtn" onclick="doneSession()" style="display:none;">Done</button>
      <button class="stop-btn webcam-only" id="stopBtn" onclick="stopSession()" style="display:none;">Stop</button>
    </div>

    <div class="status-box" id="sessionStatus">Session Status: Ready</div>
    <div class="result-box" id="result">Final Count: -</div>

    <div class="live-box" id="liveBox" style="display:none;">
      <strong>Live Webcam Feed</strong>
      <img id="liveFeed" src="" alt="Live webcam feed">
    </div>

    <div class="links-box" id="linksBox" style="display:none;">
      <strong>Downloads</strong>
      <a id="videoLink" href="#" target="_blank">View Overlay Video</a>
      <a id="reportLink" href="#" target="_blank">Download PDF Report</a>
    </div>

    <div class="history-box">
      <strong>Recent Sessions</strong>
      <div id="historyList">No sessions yet.</div>
    </div>
  </div>

  <script>
    function toggleMode() {
      const mode = document.getElementById("mode").value;
      const uploadSection = document.getElementById("uploadSection");
      const liveBox = document.getElementById("liveBox");
      const webcamButtons = document.querySelectorAll(".webcam-only");

      if (mode === "webcam") {
        uploadSection.style.display = "none";
        liveBox.style.display = "block";
        webcamButtons.forEach(btn => {
          btn.style.display = "inline-block";
        });
        document.getElementById("linksBox").style.display = "none";
        document.getElementById("result").textContent = "Final Count: -";
        document.getElementById("liveFeed").style.display = "none";
      } else {
        uploadSection.style.display = "block";
        liveBox.style.display = "none";
        document.getElementById("liveFeed").src = "";
        document.getElementById("liveFeed").style.display = "none";
        webcamButtons.forEach(btn => {
          btn.style.display = "none";
        });
      }    
    }

    function updateFileName() {
      const fileInput = document.getElementById("videoFile");
      const fileName = document.getElementById("fileName");

      if (fileInput.files.length > 0) {
        fileName.textContent = fileInput.files[0].name;
      } else {
        fileName.textContent = "No file chosen";
      }
    }

    async function startSession() {
      try {
        const mode = document.getElementById("mode").value;
        const fileInput = document.getElementById("videoFile");
        const operatorId = document.getElementById("operatorId").value;
        const batchId = document.getElementById("batchId").value;
        const confidence = document.getElementById("confidence").value;

        if (mode === "upload" && !fileInput.files.length) {
          alert("Please choose a video file first.");
          return;
        }

        document.getElementById("sessionStatus").textContent = "Session Status: Live";
        document.getElementById("result").textContent = "Webcam started. Live preview running in page.";
        document.getElementById("liveFeed").src = "/video_feed?confidence=" + encodeURIComponent(confidence);
        document.getElementById("liveFeed").style.display = "block";

        const formData = new FormData();
        formData.append("mode", mode);
        formData.append("operator_id", operatorId);
        formData.append("batch_id", batchId);
        formData.append("confidence", confidence);

        if (mode === "upload") {
          formData.append("video", fileInput.files[0]);
        }

        const res = await fetch("/start", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (data.success) {
          if (mode === "webcam") {
            document.getElementById("sessionStatus").textContent = "Session Status: Live";
            document.getElementById("result").textContent = "Webcam started. Live preview running in page.";
            document.getElementById("liveFeed").src = "/video_feed?confidence=" + encodeURIComponent(confidence);
          } else {
            document.getElementById("result").textContent =
              "Final Count: " + data.count +
              " | Operator: " + data.operator_id +
              " | Batch: " + data.batch_id;

            document.getElementById("sessionStatus").textContent = "Session Status: Completed";
            document.getElementById("linksBox").style.display = "block";
            document.getElementById("videoLink").href = data.overlay_video;
            document.getElementById("reportLink").href = data.report_file;
          }

          loadSessions();
        } else {
          document.getElementById("result").textContent = "Error: " + data.error;
          document.getElementById("sessionStatus").textContent = "Session Status: Error";
        }
      } catch (error) {
        console.error(error);
        document.getElementById("result").textContent = "Error: Could not connect to backend";
        document.getElementById("sessionStatus").textContent = "Session Status: Error";
      }
    }

    async function pauseSession() {
      try {
        const res = await fetch("/pause", { method: "POST" });
        const data = await res.json();
        document.getElementById("sessionStatus").textContent = "Session Status: Paused";
        document.getElementById("result").textContent = data.message || "Session paused.";
      } catch (error) {
        document.getElementById("sessionStatus").textContent = "Session Status: Error";
        document.getElementById("result").textContent = "Pause failed.";
      }
    }

    async function resumeSession() {
      try {
        const res = await fetch("/resume", { method: "POST" });
        const data = await res.json();
        document.getElementById("sessionStatus").textContent = "Session Status: Live";
        document.getElementById("result").textContent = data.message || "Session resumed.";
      } catch (error) {
        document.getElementById("sessionStatus").textContent = "Session Status: Error";
        document.getElementById("result").textContent = "Resume failed.";
      }
    }

    async function doneSession() {
      try {
        const res = await fetch("/done", { method: "POST" });
        const data = await res.json();

        document.getElementById("liveFeed").src = "";
        document.getElementById("liveFeed").style.display = "none";

        if (data.success) {
          document.getElementById("sessionStatus").textContent = "Session Status: Completed";
          document.getElementById("result").textContent = "Final Count: " + data.count;
          document.getElementById("linksBox").style.display = "block";
          document.getElementById("videoLink").href = data.overlay_video;
          document.getElementById("reportLink").href = data.report_file;
        } else {
          document.getElementById("sessionStatus").textContent = "Session Status: Error";
          document.getElementById("result").textContent = "Error: " + data.error;
        }

        loadSessions();
      } catch (error) {
        document.getElementById("sessionStatus").textContent = "Session Status: Error";
        document.getElementById("result").textContent = "Done action failed.";
      }
    }

    async function stopSession() {
      try {
        const res = await fetch("/stop", { method: "POST" });
        const data = await res.json();

        document.getElementById("liveFeed").src = "";
        document.getElementById("liveFeed").style.display = "none";
        document.getElementById("sessionStatus").textContent = "Session Status: Stopped";
        document.getElementById("result").textContent = data.message || "Session stopped.";
      } catch (error) {
        document.getElementById("sessionStatus").textContent = "Session Status: Error";
        document.getElementById("result").textContent = "Stop failed.";
      }
    }

    async function loadSessions() {
      try {
        const res = await fetch("/sessions");
        const data = await res.json();
        const historyList = document.getElementById("historyList");

        if (!data.success || !data.sessions.length) {
          historyList.innerHTML = "No sessions yet.";
          return;
        }

        historyList.innerHTML = data.sessions.map(session => `
          <div class="session-item">
            <strong>${session.session_id}</strong> |
            ${session.operator_id} |
            ${session.batch_id} |
            ${session.mode} |
            Count: ${session.final_count} |
            ${session.timestamp} |
            ${session.status}
          </div>
        `).join("");
      } catch (error) {
        document.getElementById("historyList").innerHTML = "Could not load session history.";
      }
    }

    window.onload = () => {
      toggleMode();
      loadSessions();
    };
  </script>

</body>
</html>
